name: Build, Push and Keyless Sign (Tagged)

on:
  push:
    # Déclenche la pipeline sur les tags comme v1.0, v2.1.3, etc.
    tags:
      - 'v*'
  workflow_dispatch: # Garde la possibilité de lancer à la main

permissions:
  contents: read
  id-token: write 

jobs:
  deploy:
    runs-on: [arc-runner-set]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Harbor
        env:
          HARBOR_USER: ${{ secrets.HARBOR_USERNAME }}
          HARBOR_PASS: ${{ secrets.HARBOR_PASSWORD }}
          HARBOR_REGISTRY: ${{ secrets.HARBOR_URL }}
        run: |
          REGISTRY_DOMAIN=$(echo $HARBOR_REGISTRY | sed -e 's|^[^/]*//||' -e 's|/.*$||')
          echo "$HARBOR_PASS" | docker login "$REGISTRY_DOMAIN" -u "$HARBOR_USER" --password-stdin

      - name: Build and Push with Tag
        run: |
          TAG_NAME="${{ github.ref_name }}"
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then TAG_NAME="latest"; fi

          IMAGE_NAME="${{ secrets.HARBOR_URL }}/teris/indiana-front:$TAG_NAME"
          IMAGE_TAG=$(echo $IMAGE_NAME | sed -e 's|^[^/]*//||')
          
          echo "Building version $TAG_NAME for linux/amd64..."
          
          # AJOUT de --platform pour garantir la compatibilité
          docker build --platform linux/amd64 -t "$IMAGE_TAG" .
          docker push "$IMAGE_TAG"
          
          # Capture du digest après le push (plus précis pour Cosign)
          DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' "$IMAGE_TAG")
          echo "IMAGE_DIGEST=$DIGEST" >> $GITHUB_ENV
      - name: Install Cosign
        uses: sigstore/cosign-installer@v3.5.0

      - name: Keyless Sign
        run: |
          cosign sign --yes ${{ env.IMAGE_DIGEST }}
