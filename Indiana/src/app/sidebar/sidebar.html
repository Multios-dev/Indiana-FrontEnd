<aside class="sidebar" [class.open]="isOpen">
<!-- sidebar dans auth afin de l'afficher une fois qu'on est connecté -->
    <!-- TODO, cacher les routes auxquelles un utilisateur n'a pas accès -->
  <!-- Logo / Unit -->
  <div class="sidebar-header">
    <img src="assets/logo_scouts.jpg" alt="Logo" class="sidebar-logo" />
    <span class="sidebar-unit-name">Indiana</span>
  </div>

  <!-- Navigation -->
  <nav class="sidebar-nav">
    <a class="nav-item" [class.active]="activeRoute === 'dashboard'" routerLink="/scouts/dashboard">
      <i class="pi pi-table"></i>
      <span>{{ "SIDEBAR.DASHBOARD" |translate}}</span>
    </a>

    <a class="nav-item" [class.active]="activeRoute === 'profile'" routerLink="/scouts/profile">
      <i class="pi pi-user"></i>
      <span>{{"SIDEBAR.PROFILE" | translate}}</span>
    </a>

    <a class="nav-item" [class.active]="activeRoute === 'events'" routerLink="/scouts/events">
      <i class="pi pi-calendar"></i>
      <span>{{"SIDEBAR.EVENT" | translate}}</span>
    </a>

    <a class="nav-item" [class.active]="activeRoute === 'billing'" routerLink="/scouts/billing">
      <i class="pi pi-credit-card"></i>
      <span>{{"SIDEBAR.FACTURATION" | translate}}</span>
    </a>
  </nav>

<!-- TODO, adapté le user footer à l'utilisateur actuellement connecté -->
  <!-- User footer -->
  <div class="sidebar-footer">
    <div class="user-avatar">PM</div>
    <div class="user-info">
      <div class="user-name">Paul Martin</div>
      <div class="user-role">Simple utilisateur</div>
      <div class="user-totem">Totem : <em>Aigle</em></div>
    </div>
    <!-- TODO  déconnecter réellement l'utilisateur-->
    <button routerLink="/connexion" class="btn-logout">
      
      <i class="pi pi-sign-out"></i>
    </button>
  </div>

</aside>
