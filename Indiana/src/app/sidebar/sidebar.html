<aside class="sidebar" [class.open]="isOpen">

    <!-- TODO, cacher les routes auxquelles un utilisateur n'a pas accès -->
  <!-- Logo / Unité -->
  <div class="sidebar-header">
    <img src="assets/logo_scouts.jpg" alt="Logo" class="sidebar-logo" />
    <span class="sidebar-unit-name">Indiana</span>
  </div>

  <!-- Navigation -->
  <nav class="sidebar-nav">
    <a class="nav-item" [class.active]="activeRoute === 'dashboard'" routerLink="/dashboard">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
        <rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>
      </svg>
      <span>{{ "SIDEBAR.DASHBOARD" |translate}}</span>
    </a>

    <a class="nav-item" [class.active]="activeRoute === 'profile'" routerLink="/profile">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
        <circle cx="12" cy="7" r="4"/>
      </svg>
      <span>{{"SIDEBAR.PROFILE" | translate}}</span>
    </a>

    <a class="nav-item" [class.active]="activeRoute === 'events'" routerLink="/events">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
        <line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/>
        <line x1="3" y1="10" x2="21" y2="10"/>
      </svg>
      <span>{{"SIDEBAR.EVENT" | translate}}</span>
    </a>

    <a class="nav-item" [class.active]="activeRoute === 'billing'" routerLink="/billing">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="2" y="5" width="20" height="14" rx="2"/>
        <line x1="2" y1="10" x2="22" y2="10"/>
      </svg>
      <span>{{"SIDEBAR.FACTURATION" | translate}}</span>
    </a>
  </nav>
<!-- FIN TODO, cacher les routes auxquelles un utilisateur n'a pas accès -->

<!-- TODO, adapté le user footer à l'utilisateur actuellement connecté -->
  <!-- User footer -->
  <div class="sidebar-footer">
    <div class="user-avatar">PM</div>
    <div class="user-info">
      <div class="user-name">Paul Martin</div>
      <div class="user-role">Simple utilisateur</div>
      <div class="user-totem">Totem : <em>Aigle</em></div>
    </div>
    <button class="btn-logout" title="Se déconnecter">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
        <polyline points="16 17 21 12 16 7"/>
        <line x1="21" y1="12" x2="9" y2="12"/>
      </svg>
    </button>
  </div>
  <!-- FIN TODO -->

</aside>
