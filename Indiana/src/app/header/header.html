<header class="app-header">
  <p-button icon="pi pi-bars" (onClick)="menuToggle.emit()"></p-button>
  <div class="logo-wrap">
    <img src="assets/logo_scouts.jpg" alt="Les Scouts Pluralistes" class="logo">
  </div>
  <div class="lang-switcher">
    @for (lang of langList; track $index) {
      <button
        [class.active]="lang === currentLang()"
        (click)="switchLang(lang)">
        {{ langFlags[lang] }} {{ lang.toUpperCase() }}
      </button>
    }
  </div>
</header>
