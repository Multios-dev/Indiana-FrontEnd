<div class="register-page">
  <div class="register-container">

    <!-- Title -->
    <h1 class="title">{{ "REGISTER.TITLE" | translate }}</h1>
    <p class="subtitle">{{ "REGISTER.SUBTITLE" | translate }}</p>

    <!-- Options -->
    <div class="options">

      <!-- eID -->
      <button type="button" class="option-card" routerLink="/inscription/eid">
        <div class="option-icon option-icon--blue">
          <i class="pi pi-id-card"></i>
        </div>

        <div class="option-text">
          <span class="option-title">{{ "REGISTER.EID_TITLE" | translate }}</span>
          <span class="option-desc">{{ "REGISTER.EID_DESC" | translate }}</span>
        </div>

        <div class="option-arrow">
          <i class="pi pi-chevron-right"></i>
        </div>
      </button>

      <!-- Manual -->
      <button type="button" class="option-card" routerLink="/inscription/manuel">
        <div class="option-icon option-icon--blue">
          <i class="pi pi-pencil"></i>
        </div>

        <div class="option-text">
          <span class="option-title">{{ "REGISTER.MANUAL_TITLE" | translate }}</span>
          <span class="option-desc">{{ "REGISTER.MANUAL_DESC" | translate }}</span>
        </div>

        <div class="option-arrow">
          <i class="pi pi-chevron-right"></i>
        </div>
      </button>

    </div>

    <!-- Login link -->
    <p class="login-line">
      {{ "REGISTER.ALREADY_ACCOUNT" | translate }}
      <a routerLink="/connexion" class="login-link">
        {{ "REGISTER.LOGIN_LINK" | translate }}
      </a>
    </p>

  </div>
</div>
