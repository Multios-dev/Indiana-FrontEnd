<div class="register-page">
  <div class="register-container">

    <!-- Logo -->
    <div class="logo-wrap">
      <img src="logo_scouts.jpg" alt="Les Scouts Pluralistes" class="logo">
    </div>

    <!-- Title -->
    <h1 class="title">Créer un compte</h1>
    <p class="subtitle">Choisissez votre méthode d'inscription</p>

    <!-- Options -->
    <div class="options">

      <!-- eID -->
      <button type="button" class="option-card" routerLink="/inscription/eid">
        <div class="option-icon option-icon--blue">
          <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
            <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 8.25h19.5M2.25 9h19.5m-16.5 5.25h6m-6 2.25h3m-3.75 3h15a2.25 2.25 0 002.25-2.25V6.75A2.25 2.25 0 0019.5 4.5h-15a2.25 2.25 0 00-2.25 2.25v10.5A2.25 2.25 0 004.5 19.5z"/>
          </svg>
        </div>
        <div class="option-text">
          <span class="option-title">Avec ma carte d'identité belge</span>
          <span class="option-desc">Lecteur de carte requis. Votre identité est lue directement depuis la puce de votre eID.</span>
        </div>
        <div class="option-arrow">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M8.25 4.5l7.5 7.5-7.5 7.5"/>
          </svg>
        </div>
      </button>

      <!-- Manuel -->
      <button type="button" class="option-card" routerLink="/inscription/manuel">
        <div class="option-icon option-icon--gray">
          <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
            <path stroke-linecap="round" stroke-linejoin="round" d="M16.862 4.487l1.687-1.688a1.875 1.875 0 112.652 2.652L10.582 16.07a4.5 4.5 0 01-1.897 1.13L6 18l.8-2.685a4.5 4.5 0 011.13-1.897l8.932-8.931zm0 0L19.5 7.125M18 14v4.75A2.25 2.25 0 0115.75 21H5.25A2.25 2.25 0 013 18.75V8.25A2.25 2.25 0 015.25 6H10"/>
          </svg>
        </div>
        <div class="option-text">
          <span class="option-title">Sans carte d'identité</span>
          <span class="option-desc">Saisissez manuellement vos informations personnelles et choisissez un mot de passe.</span>
        </div>
        <div class="option-arrow">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M8.25 4.5l7.5 7.5-7.5 7.5"/>
          </svg>
        </div>
      </button>

    </div>

    <!-- Login link -->
    <p class="login-line">
      Déjà un compte ?
      <a routerLink="/connexion" class="login-link">Se connecter</a>
    </p>

  </div>
</div>
