<div class="login-page">

  <div class="login-card">

    <!-- Logo -->
    

    <!-- Title -->
    <h1 class="title">Se connecter</h1>
    <p class="subtitle">Accédez à votre espace Indiana</p>

    <!-- Error -->
    <div *ngIf="error" class="error-banner">
      <span>⚠</span> {{ error }}
    </div>

    <!-- Form -->
    <form [formGroup]="loginForm" (ngSubmit)="submit()" novalidate>

      <!-- Email -->
      <div class="field-group" [class.has-error]="username?.invalid && username?.touched">
        <label class="field-label">Adresse email</label>
        <input
          type="email"
          formControlName="username"
          placeholder="prenom.nom@exemple.be"
          class="field-input"
          autocomplete="email"
        >
        <p class="field-hint" *ngIf="username?.invalid && username?.touched">
          Veuillez entrer une adresse email valide
        </p>
      </div>

      <!-- Password -->
      <div class="field-group" [class.has-error]="password?.invalid && password?.touched">
        <label class="field-label">Mot de passe</label>
        <div class="input-wrapper">
          <input
            [type]="showPassword() ? 'text' : 'password'"
            formControlName="password"
            placeholder="••••••••"
            class="field-input"
            autocomplete="current-password"
          >
          <button type="button" (click)="togglePassword()" class="eye-btn">
            <svg *ngIf="!showPassword()" xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
              <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z"/>
              <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
            </svg>
            <svg *ngIf="showPassword()" xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
              <path stroke-linecap="round" stroke-linejoin="round" d="M3.98 8.223A10.477 10.477 0 001.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.45 10.45 0 0112 4.5c4.756 0 8.773 3.162 10.065 7.498a10.523 10.523 0 01-4.293 5.774M6.228 6.228L3 3m3.228 3.228l3.65 3.65m7.894 7.894L21 21m-3.228-3.228l-3.65-3.65m0 0a3 3 0 10-4.243-4.243m4.242 4.242L9.88 9.88"/>
            </svg>
          </button>
        </div>
        <p class="field-hint" *ngIf="password?.invalid && password?.touched">
          Le mot de passe est requis
        </p>
        <div class="forgot-wrap">
          <a routerLink="/mot-de-passe-oublie" class="forgot-link">Mot de passe oublié ?</a>
        </div>
      </div>

      <!-- Submit -->
      <button class="submit-btn" (click)="submit()">
        Se connecter
      </button>

    </form>

    <!-- Divider -->
    <div class="divider">
      <span>ou se connecter avec</span>
    </div>

    <!-- OAuth -->
    <div class="oauth-grid">
      <button type="button" class="oauth-btn">
        <img src="assets/google.jpg" alt="" class="oauth-icon">
        Google
      </button>
      <button type="button" class="oauth-btn">
        <strong>itsme</strong>
      </button>
    </div>

    <!-- Sign up -->
    <p class="signup-line">
      Pas encore de compte ?
      <a routerLink="/inscription" class="signup-link">Créer un compte</a>
    </p>

  </div>
</div>
