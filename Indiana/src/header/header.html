<header class="app-header">
  <div class="logo">
      <img src="assets/logo_scouts.jpg" alt="Les Scouts Pluralistes" class="logo">
    </div>
  <div class="lang-switcher">
    <button 
      *ngFor="let lang of langs" 
      [class.active]="lang === currentLang()"
      (click)="switchLang(lang)">
      {{ langLabels[lang] }}
    </button>
  </div>
</header>
